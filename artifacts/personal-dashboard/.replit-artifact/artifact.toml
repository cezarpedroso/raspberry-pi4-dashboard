kind = "web"
previewPath = "/"
title = "Personal Dashboard"
version = "1.0.0"
id = "artifacts/personal-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19141

[services.development]
run = "pnpm --filter @workspace/personal-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/personal-dashboard", "run", "build" ]
publicDir = "artifacts/personal-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19141"
BASE_PATH = "/"
